<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 81.25%;
      background-color: rgba(60,60,60,1);
      color: #e8eaed;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    .ntp-content {
      margin-top: 130px; 
      width: 100%;
      max-width: 746px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .logo-container {
      margin-bottom: 38px;
      user-select: none;
    }
    .logo-container img {
      width: 272px; 
      height: auto;
    }
    .search-form {
      width: 100%;
    }
    .search-box {
      width: 100%;
      height: 56px;
      background-color: #FFFFFF; 
      border-radius: 100px; 
      display: flex;
      align-items: center;
      padding: 0 14px 0 16px; 
      box-shadow: 0 1px 6px 0 rgba(32,33,36,0.28);
     font-family: inherit; 
  font-weight: 900; 
  font-size: 16px;
    }
    .left-actions {
      display: flex;
      align-items: center;
      margin-right: 13px;
      flex-shrink: 0;
    }
    .plus-icon {
      width: 20px;
      height: 20px;
      fill: #5f6368;
    }
    .search-input {
      flex: 1;
      min-width: 0; 
      height: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #202124; 
      font-size: 16px;
    }
    .search-input::placeholder {
      color: #999999;
    }
    .right-actions {
      display: flex;
      align-items: center;
      gap: 20px; 
      flex-shrink: 0;
    }
    .action-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .action-icon svg {
      width: 20px;
      height: 20px;
      fill: #000000; /* this was originally gray and i did NOT realize that it was there which was BAD */
    }
    .shortcuts-grid {
      margin-top: 120px; 
      display: flex;
      justify-content: center;
      gap: 16px;
    }
    .shortcut-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 112px;
      border-radius: 4px;
      padding: 8px;
      cursor: pointer;
    }
    .tile-icon-wrapper {
      width: 48px;
      height: 48px;
      background-color: rgba(0, 0, 0, 0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }
    .tile-icon-wrapper svg {
      width: 20px;
      height: 20px;
      fill: #e8eaed;
    }
    .tile-title {
      font-size: 12px;
      color: #e8eaed;
    }
    
  </style>
</head>
<body>
